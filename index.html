<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>热门活动场次监控 Dashboard</title>
<style>
/* ===== Trip admin design tokens ===== */
:root {
  --c-primary:    #2b75ff;
  --c-primary-bg: #eaf3ff;
  --c-warn:       #ff7a45;
  --c-warn-bg:    #fff4ee;
  --c-danger:     #ff4d4f;
  --c-danger-bg:  #fff1f0;
  --c-success:    #1ba974;
  --c-success-bg: #e8f8f0;
  --c-tier:       #7a3df0;
  --c-tier-bg:    #f4ecff;
  --c-text:       #1f2329;
  --c-text-2:     #4a5160;
  --c-muted:      #9aa0aa;
  --c-disabled:   #c9ccd1;
  --c-line:       #ebedf0;
  --c-bg:         #f5f6f8;
  --c-white:      #ffffff;
  --r-sm: 4px; --r-md: 6px; --r-lg: 8px; --r-pill: 14px;
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:20px; --s-6:24px; --s-7:32px;
  --fz-xs:11px; --fz-sm:12px; --fz-md:13px; --fz-lg:14px; --fz-xl:16px;
  --sh-card: 0 1px 3px rgba(20,40,80,.06);
  --sh-pop:  0 4px 12px rgba(0,0,0,.12);
  --z-sticky-th: 12; --z-sticky-left: 11; --z-sticky-right: 10;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: var(--fz-md); color: var(--c-text); background: var(--c-bg);
}

/* ===== Watermark ===== */
body::before {
  content: attr(data-watermark);
  position: fixed; inset: 0;
  display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(8, 1fr);
  pointer-events: none; z-index: 9999;
  color: rgba(120,130,150,.06); font-size: 13px; white-space: pre;
}

/* ===== Shell ===== */
.topbar {
  height: 56px; background: var(--c-primary); color: #fff;
  display: flex; align-items: center; padding: 0 28px;
  box-shadow: 0 2px 4px rgba(0,0,0,.06); position: relative; z-index: 30;
}
.topbar .brand { font-size: 16px; font-weight: 600; letter-spacing: .3px; }
.topbar .spacer { flex: 1; }
.topbar .topbar-actions { display: flex; align-items: center; gap: 8px; }
.topbar .lang-btn {
  background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25);
  padding: 4px 12px; border-radius: var(--r-sm); font-size: var(--fz-sm);
  cursor: pointer; transition: .15s; font-family: inherit;
}
.topbar .lang-btn:hover { background: rgba(255,255,255,.25); }
.topbar .lang-btn.active { background: #fff; color: var(--c-primary); border-color: #fff; }
.topbar .avatar {
  width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.2);
  margin-left: 8px; display: inline-flex; align-items: center; justify-content: center;
  font-size: var(--fz-sm); font-weight: 600;
}

.layout { display: flex; height: calc(100vh - 56px); min-height: 0; }

.main {
  flex: 1; min-width: 0; height: 100%;
  overflow: auto; position: relative;
}

/* ===== Page header ===== */
header.top-header {
  padding: 20px 28px 12px;
  background: var(--c-white);
  border-bottom: 1px solid var(--c-line);
}
.header-row {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 2px;
}
h1 { margin: 0; font-size: 20px; font-weight: 700; color: var(--c-text); letter-spacing: -.01em; }
.subtitle { color: var(--c-muted); font-size: var(--fz-sm); margin-top: 3px; }
.meta-line { color: var(--c-muted); font-size: var(--fz-xs); padding-top: 6px; }

/* ===== Filter bar ===== */
.filter-bar {
  background: var(--c-white);
  border-bottom: 1px solid var(--c-line);
  padding: 10px 28px;
  box-shadow: 0 1px 4px rgba(20,40,80,.04);
}
/* fixed (detached) state — position set by JS, no layout impact */
.filter-bar.bar-fixed { box-shadow: 0 3px 10px rgba(20,40,80,.12); }
.filter-bar-summary { display: none; align-items: center; gap: 8px; flex-wrap: wrap; min-height: 34px; }
.filter-bar.bar-fixed .filter-row { display: none; }
.filter-bar.bar-fixed .filter-bar-summary { display: flex; }
.filter-bar.bar-fixed.bar-expanded .filter-row { display: flex; }
.filter-bar.bar-fixed.bar-expanded .filter-bar-summary {
  padding-bottom: 10px; border-bottom: 1px solid var(--c-line); margin-bottom: 2px;
}
.filter-active-chips { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; min-width: 0; align-items: center; }
.filter-active-chip {
  background: var(--c-primary-bg); color: var(--c-primary);
  border: 1px solid rgba(43,117,255,.3);
  padding: 2px 8px; border-radius: var(--r-pill); font-size: var(--fz-xs); white-space: nowrap;
}
.filter-active-chip.chip-all { background: transparent; border-color: var(--c-line); color: var(--c-muted); }
.filter-toggle-btn {
  background: var(--c-primary-bg); color: var(--c-primary);
  border: 1px solid var(--c-primary); padding: 3px 12px;
  border-radius: var(--r-pill); font-size: var(--fz-xs);
  cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; transition: .15s;
}
.filter-toggle-btn:hover { background: var(--c-primary); color: #fff; }
.search-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 28px;
  background: var(--c-white);
  border-bottom: 1px solid var(--c-line);
}
.filter-row {
  display: flex; align-items: center; column-gap: 8px; row-gap: 10px; flex-wrap: wrap; margin-bottom: 12px;
}
.chips-line { display: flex; flex-wrap: wrap; align-items: center; column-gap: 6px; row-gap: 8px; flex: 1; min-width: 0; }
.filter-row:last-child { margin-bottom: 0; }
.filter-label {
  font-size: var(--fz-xs); color: var(--c-muted); min-width: 56px;
  text-transform: uppercase; letter-spacing: .04em; font-weight: 600;
  line-height: 26px; flex-shrink: 0; align-self: flex-start;
}
.chip {
  padding: 3px 12px; border-radius: var(--r-pill); font-size: var(--fz-xs); cursor: pointer;
  background: transparent; color: var(--c-text-2); border: 1px solid var(--c-line);
  user-select: none; transition: all .12s; white-space: nowrap;
}
.chip:hover { border-color: var(--c-primary); color: var(--c-primary); background: var(--c-primary-bg); }
.chip.active { color: var(--c-primary); border-color: var(--c-primary); background: var(--c-primary-bg); font-weight: 500; }
.chip .cnt { color: var(--c-muted); font-size: 10px; margin-left: 4px; font-variant-numeric: tabular-nums; }
.chip.active .cnt { color: var(--c-primary); opacity: .7; }
.search-box {
  background: var(--c-white); color: var(--c-text); border: 1px solid var(--c-line);
  padding: 0 10px; height: 30px; border-radius: var(--r-sm); font-size: var(--fz-sm);
  flex: 1; font-family: inherit; transition: border-color .15s;
}
.search-box:focus { outline: none; border-color: var(--c-primary); }
.reset-btn {
  background: transparent; border: 1px solid var(--c-line); color: var(--c-text-2);
  padding: 0 12px; height: 28px; border-radius: var(--r-sm); cursor: pointer;
  font-size: var(--fz-xs); margin-left: auto; font-family: inherit; transition: .15s;
}
.reset-btn:hover { border-color: var(--c-danger); color: var(--c-danger); }

/* ===== Page content ===== */
.page-content { padding: 20px 28px 60px; }
.section { margin-bottom: 28px; }
.section-title {
  font-size: 15px; font-weight: 600; margin: 0 0 14px; padding-left: 10px;
  border-left: 3px solid var(--c-primary); color: var(--c-text); line-height: 1.3;
}

/* ===== Overview cards ===== */
.overview-grid {
  display: grid; grid-template-columns: 1fr 1.4fr 1.4fr; gap: 14px;
}
@media (max-width: 900px) { .overview-grid { grid-template-columns: 1fr; } }
.card {
  background: var(--c-white); border: 1px solid var(--c-line);
  border-radius: var(--r-lg); padding: 18px; box-shadow: var(--sh-card);
}
.card-title {
  font-size: var(--fz-xs); color: var(--c-muted); text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 12px; font-weight: 600;
}
.big-num {
  font-size: 40px; font-weight: 700; letter-spacing: -.02em; line-height: 1;
  font-variant-numeric: tabular-nums; color: var(--c-text);
}
.big-num-label { font-size: var(--fz-sm); color: var(--c-muted); margin-top: 4px; }
.source-breakdown { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; font-size: var(--fz-sm); }
.source-breakdown .row { display: flex; justify-content: space-between; }
.source-breakdown .row span:last-child { color: var(--c-muted); font-variant-numeric: tabular-nums; }

.grade-list { display: flex; flex-direction: column; gap: 8px; }
.grade-row { display: grid; grid-template-columns: 36px 1fr auto; gap: 10px; align-items: center; font-size: var(--fz-sm); }
.grade-tag {
  font-weight: 700; text-align: center; padding: 2px 6px; border-radius: var(--r-sm);
  font-size: var(--fz-xs);
}
.grade-bar { height: 6px; background: var(--c-line); border-radius: 3px; overflow: hidden; }
.grade-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.grade-cnt { font-variant-numeric: tabular-nums; color: var(--c-muted); font-size: var(--fz-xs); min-width: 28px; text-align: right; }

.top-list { display: flex; flex-direction: column; gap: 8px; }
.top-row { display: grid; grid-template-columns: 28px auto 1fr auto; gap: 8px; align-items: center; font-size: var(--fz-sm); }
.top-name { white-space: nowrap; }
.top-rank { color: var(--c-muted); font-size: var(--fz-xs); font-variant-numeric: tabular-nums; }
.top-cnt { color: var(--c-muted); font-variant-numeric: tabular-nums; font-size: var(--fz-xs); }

/* ===== Month sections ===== */
.month-header {
  display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
  margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--c-line);
}
.month-name { font-size: 20px; font-weight: 700; color: var(--c-text); letter-spacing: -.01em; }
.month-count {
  background: var(--c-primary-bg); color: var(--c-primary);
  padding: 2px 10px; border-radius: var(--r-pill); font-size: var(--fz-xs); font-weight: 500;
}
.month-grade-pill {
  padding: 2px 8px; border-radius: var(--r-pill); font-size: 10px; font-weight: 600;
}

/* ===== Table ===== */
.table-wrap { border: 1px solid var(--c-line); border-radius: var(--r-lg); overflow: auto; background: var(--c-white); }
table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: var(--fz-sm); }
thead th {
  position: sticky; top: 0; z-index: var(--z-sticky-th);
  text-align: left; padding: 9px 12px; font-weight: 500; color: var(--c-text-2);
  font-size: var(--fz-xs); text-transform: uppercase; letter-spacing: .04em;
  white-space: nowrap; border-bottom: 1px solid var(--c-line);
  background: #f7f8fa; cursor: pointer; user-select: none;
}
thead th:hover { color: var(--c-primary); }
tbody td {
  padding: 9px 12px; border-bottom: 1px solid var(--c-line);
  vertical-align: top; max-width: 300px; background: var(--c-white); color: var(--c-text);
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8faff; }
tbody tr:hover td.sticky-1, tbody tr:hover td.sticky-2, tbody tr:hover td.sticky-3,
tbody tr:hover td.sticky-4, tbody tr:hover td.sticky-5 { background: #f8faff; }
tr.tr-new td.sticky-1, tr.tr-new td.sticky-2, tr.tr-new td.sticky-3,
tr.tr-new td.sticky-4, tr.tr-new td.sticky-5 { background: #fffbe6; }
tr.tr-new:hover td.sticky-1, tr.tr-new:hover td.sticky-2, tr.tr-new:hover td.sticky-3,
tr.tr-new:hover td.sticky-4, tr.tr-new:hover td.sticky-5 { background: #fff3b0; }
td.num, td.date { font-variant-numeric: tabular-nums; white-space: nowrap; }
td.wrap { word-break: break-word; white-space: pre-wrap; }
.empty { color: var(--c-disabled); }
/* column min-widths */
table th:nth-child(1)  { width: 40px; }
table th:nth-child(4)  { min-width: 280px; }
table th:nth-child(5)  { min-width: 140px; }
table th:nth-child(6)  { min-width: 200px; }
table th:nth-child(8)  { min-width: 100px; }
/* sticky left columns 1-5 */
.sticky-1 { position: sticky; left: 0;     z-index: var(--z-sticky-left); background: var(--c-white); }
.sticky-2 { position: sticky; left: 40px;  z-index: var(--z-sticky-left); background: var(--c-white); }
.sticky-3 { position: sticky; left: 120px; z-index: var(--z-sticky-left); background: var(--c-white); }
.sticky-4 { position: sticky; left: 192px; z-index: var(--z-sticky-left); background: var(--c-white); }
.sticky-5 { position: sticky; left: 472px; z-index: var(--z-sticky-left); background: var(--c-white); }
/* corner cells (sticky top + sticky left) need higher z-index */
thead th.sticky-1, thead th.sticky-2, thead th.sticky-3,
thead th.sticky-4, thead th.sticky-5 { z-index: 20; }
/* right shadow to mark frozen boundary */
.sticky-5::after {
  content: ''; position: absolute; top: 0; right: -4px; bottom: 0;
  width: 4px; background: linear-gradient(to right, rgba(0,0,0,.06), transparent);
  pointer-events: none;
}
/* fix col widths so sticky left values are exact */
table th.sticky-1 { width: 40px;  min-width: 40px;  max-width: 40px; }
table th.sticky-2 { width: 80px;  min-width: 80px;  max-width: 80px; }
table th.sticky-3 { width: 72px;  min-width: 72px;  max-width: 72px; }
table th.sticky-4 { width: 280px; min-width: 280px; }
table th.sticky-5 { width: 140px; min-width: 140px; }
table th:nth-child(10), table th:nth-child(11), table th:nth-child(15),
table th:nth-child(16), table th:nth-child(17) { min-width: 100px; }
table th:nth-child(12) { min-width: 120px; }
table th:nth-child(13) { min-width: 130px; }
table th:nth-child(14) { min-width: 160px; }
table th:nth-child(19), table th:nth-child(20) { min-width: 160px; }
table th:nth-child(21) { min-width: 280px; }
/* new records highlight (added within last 7 days) */
tr.tr-new td { background: #fffbe6; }
tr.tr-new td.sticky-1, tr.tr-new td.sticky-2, tr.tr-new td.sticky-3,
tr.tr-new td.sticky-4, tr.tr-new td.sticky-5 { background: #fffbe6; }
tr.tr-new:hover td { background: #fff3b0; }
tr.tr-new:hover td.sticky-1, tr.tr-new:hover td.sticky-2, tr.tr-new:hover td.sticky-3,
tr.tr-new:hover td.sticky-4, tr.tr-new:hover td.sticky-5 { background: #fff3b0; }

/* ===== Tags & badges ===== */
.tag {
  display: inline-block; padding: 2px 10px; border-radius: var(--r-sm);
  font-size: var(--fz-xs); font-weight: 600; line-height: 18px;
}
.tag-grade-S\+, .tag-grade-S-plus { background: var(--c-danger-bg); color: var(--c-danger); }
.tag-grade-S  { background: var(--c-warn-bg);    color: var(--c-warn); }
.tag-grade-A  { background: var(--c-success-bg); color: var(--c-success); }
.tag-grade-B  { background: var(--c-primary-bg); color: var(--c-primary); }
.tag-grade-C  { background: #f0f1f4; color: var(--c-muted); }
.tag-grade-D  { background: #f7f8fa; color: var(--c-disabled); }
.tag-cat { background: var(--c-primary-bg); color: var(--c-primary); padding: 2px 10px; border-radius: var(--r-sm); font-size: var(--fz-xs); font-weight: 500; }
.tag-source-cooperation    { background: var(--c-success-bg); color: var(--c-success); }
.tag-source-non_cooperation{ background: var(--c-primary-bg); color: var(--c-primary); }
.tag-source-sports         { background: var(--c-warn-bg);    color: var(--c-warn); }
.tag-source { padding: 2px 10px; border-radius: var(--r-sm); font-size: var(--fz-xs); font-weight: 600; white-space: nowrap; }

.summary-line { color: var(--c-muted); font-size: var(--fz-sm); margin-bottom: 12px; }
.no-data { padding: 48px; text-align: center; color: var(--c-muted); font-size: var(--fz-md); }

::-webkit-scrollbar { height: 8px; width: 8px; }
::-webkit-scrollbar-track { background: var(--c-bg); }
::-webkit-scrollbar-thumb { background: var(--c-line); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--c-disabled); }
</style>
</head>
<body data-watermark="Campaign Admin · {{NOW}}">

<div class="topbar">
  <div class="brand" data-i18n="title">热门活动场次监控</div>
  <div class="spacer"></div>
  <div class="topbar-actions">
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">English</button>
  </div>
</div>

<div class="layout">
  <aside class="side" style="display:none">
    <div class="nav-item active" title="活动监控">★</div>
    <div class="nav-item" title="数据分析">◈</div>
    <div class="nav-item" title="筛选配置">⊞</div>
    <div class="nav-item" title="设置">⚙</div>
  </aside>

  <div class="main">

<header class="top-header">
  <div class="header-row">
    <div>
      <div class="subtitle" data-i18n="subtitle">合作类 · 非合作类 · 赛事类 数据聚合视图</div>
    </div>
    <div class="meta-line">
      <span data-i18n="source">数据源: 飞书表「【新】热门活动场次监控」</span> ·
      <span data-i18n="updated">更新: <span id="update-date"></span></span>
    </div>
  </div>
</header>

<div class="search-bar">
  <input type="text" class="search-box" id="f-search" placeholder="搜索 名称 / 艺人 / 城市 / 国家 / 备注…" data-i18n-placeholder="ph-search">
</div>

<div class="filter-bar">
  <div class="filter-bar-summary">
    <div class="filter-active-chips" id="filter-active-chips"></div>
    <button class="filter-toggle-btn" id="filter-toggle-btn">展开 ▾</button>
  </div>
  <div class="filter-row">
    <span class="filter-label" data-i18n="lbl-source">类型</span>
    <div id="f-source" class="chips-line"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label" data-i18n="lbl-category">品类</span>
    <div id="f-category" class="chips-line"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label" data-i18n="lbl-grading">评级</span>
    <div id="f-grading" class="chips-line"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label" data-i18n="lbl-country">国家</span>
    <div id="f-country" class="chips-line"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label" data-i18n="lbl-year">年份</span>
    <div id="f-year" class="chips-line"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label" data-i18n="lbl-month">月份</span>
    <div id="f-month" class="chips-line"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label" data-i18n="lbl-created">创建时间</span>
    <div id="f-created" class="chips-line"></div>
    <label style="margin-left:auto;display:flex;align-items:center;gap:6px;color:var(--c-muted);font-size:var(--fz-xs);">
      <input type="checkbox" id="f-active"> <span data-i18n="only-active">仅显示未结束</span>
    </label>
    <button class="reset-btn" id="f-reset" data-i18n="reset" style="margin-left:12px;">重置筛选</button>
  </div>
</div>

<div class="page-content">
  <div class="section">
    <h2 class="section-title" data-i18n="overview">总览</h2>
    <div class="overview-grid">
      <div class="card">
        <div class="card-title" data-i18n="total">总场次</div>
        <div class="big-num" id="ov-total">0</div>
        <div class="source-breakdown" id="ov-source"></div>
      </div>
      <div class="card">
        <div class="card-title" data-i18n="grade-dist">评级分布</div>
        <div class="grade-list" id="ov-grading"></div>
      </div>
      <div class="card">
        <div class="card-title" data-i18n="top-country">Top 国家/地区</div>
        <div class="top-list" id="ov-country"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div id="month-sections"></div>
  </div>
</div>

  function buildFilters() {
    // Source

    for (const r of RECORDS) {
      if (r._year) yearMap.set(String(r._year), (yearMap.get(String(r._year))||0)+1);

    // Month - filter by selected year, sort chronologically
    const today = startOfToday();
    const monthMap = new Map();
    for (const r of RECORDS) {
      if (r._year && r._month) {
        if (state.year && String(r._year) !== state.year) continue;
        const k = r._year + '-' + String(r._month).padStart(2,'0');
        monthMap.set(k, (monthMap.get(k)||0)+1);
      }
    }
    const monthKeys = [...monthMap.keys()].sort();
    const multiYear = new Set(monthKeys.map(k => k.split('-')[0])).size > 1;
    const monthOpts = monthKeys.map(k => {
      const [y,m] = k.split('-');
      const label = LANG === 'zh'
        ? (multiYear ? y + '/' : '') + I18N[LANG].monthNames[+m - 1]
        : I18N[LANG].monthNames[+m - 1] + ' ' + y;
      return [k, monthMap.get(k), label];
    });
    // Reset month selection if it no longer exists in filtered options
    if (state.month && !monthMap.has(state.month)) state.month = '';
    renderChips('f-month', monthOpts, state.month, v => { state.month = v; rerender(); });

    // Created-within chips (fixed options, no count)

      ['30', null, t('created-30')],

        if (mk !== state.month) return false;

      if (search) {
        const blob = LANG === 'en'
          ? [r.name, r.name_en, r.artist, r.artist_en, r.city, r.city_en, r.country, r.country_en, r.remarks, r.remarks_en, r.category, r.category_en, r.eventType, r.eventType_en, r.keySites, r.pushSites, r.poiId].join(' ').toLowerCase()
          : [r.name, r.artist, r.city, r.country, r.remarks, r.category, r.eventType, r.keySites, r.pushSites, r.poiId].join(' ').toLowerCase();
        if (!blob.includes(search)) return false;
      }
      return true;
    });
  }

  // ---------- Render Overview ----------
  function renderOverview(filtered) {
    $('ov-total').textContent = filtered.length;
    // Source breakdown
    const srcEl = $('ov-source');
    srcEl.innerHTML = '';
    ['cooperation','non_cooperation','sports'].forEach(s => {
      const cnt = filtered.filter(r => r.source === s).length;
      const div = document.createElement('div'); div.className = 'row';
      div.innerHTML = '<span><span class="tag tag-source tag-source-'+s+'">'+I18N[LANG].sources[s]+'</span></span><span>' + cnt + '</span>';
      srcEl.appendChild(div);
    });
    // Grading
    const gEl = $('ov-grading');
    gEl.innerHTML = '';
    const gradeOrder = ['S+','S','A','B','C','D'];
    const gradeColors = { 'S+':'var(--c-danger)','S':'var(--c-warn)','A':'var(--c-success)','B':'var(--c-primary)','C':'var(--c-muted)','D':'var(--c-disabled)' };
    const total = filtered.length || 1;
    const gradeCnts = {};
    gradeOrder.forEach(g => gradeCnts[g] = 0);
    filtered.forEach(r => { const g = r.grading.trim(); if (gradeCnts[g] !== undefined) gradeCnts[g]++; });
    gradeOrder.forEach(g => {
      if (gradeCnts[g] === 0) return;
      const pct = (gradeCnts[g] / total * 100).toFixed(1);
      const row = document.createElement('div'); row.className = 'grade-row';
      const safeG = g.replace('+','-plus');
      row.innerHTML = '<span class="grade-tag tag-grade-'+safeG+'">'+g+'</span>' +
                      '<div class="grade-bar"><div class="grade-bar-fill" style="width:'+pct+'%;background:'+gradeColors[g]+'"></div></div>' +
                      '<span class="grade-cnt">'+gradeCnts[g]+'</span>';
      gEl.appendChild(row);
    });
    // Country
    const cEl = $('ov-country');
    cEl.innerHTML = '';
    const cMap = new Map();
    filtered.forEach(r => {
      const countries = r._countries && r._countries.length ? r._countries : (r.country ? [r.country] : []);
      countries.forEach(c => {
        const k = LANG === 'en' ? (translate(c, 'country') || c) : c;
        if (k) cMap.set(k, (cMap.get(k)||0)+1);
      });
    });
    const top = [...cMap.entries()].sort((a,b)=>b[1]-a[1]).slice(0, 8);
    const topMax = top[0] ? top[0][1] : 1;
    top.forEach(([k, c], i) => {
      const pct = (c / topMax * 100).toFixed(1);
      const row = document.createElement('div'); row.className = 'top-row';
      row.innerHTML = '<span class="top-rank">#'+(i+1)+'</span>' +
        '<span class="top-name">'+escapeHtml(k)+'</span>' +
        '<div class="grade-bar" style="flex:1"><div class="grade-bar-fill" style="width:'+pct+'%;background:var(--c-primary)"></div></div>' +
        '<span class="top-cnt">'+c+'</span>';
      cEl.appendChild(row);
    });
  }

  // ---------- Render month sections ----------
  function renderMonthSections(filtered) {
    const wrap = $('month-sections');
    wrap.innerHTML = '';
    if (filtered.length === 0) {
      wrap.innerHTML = '<div class="card no-data">' + t('noData') + '</div>';
      return;
    }
    // Group
    const groups = new Map();
    filtered.forEach(r => {
      const key = (r._year && r._month) ? r._year + '-' + String(r._month).padStart(2,'0') : '0000-00';
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(r);
    });
    const sortedKeys = [...groups.keys()].sort();
    sortedKeys.forEach(k => {
      const records = groups.get(k).sort((a,b) => (a._sortDate || Infinity) - (b._sortDate || Infinity));
      const sec = document.createElement('div'); sec.className = 'month-section'; sec.style.marginBottom = '28px';
      let title;
      if (k === '0000-00') title = t('noMonth');
      else {
        const [y,m] = k.split('-');
        if (LANG === 'zh') {
          title = y + '年' + I18N[LANG].monthNames[+m - 1];
        } else {
          title = I18N[LANG].monthNames[+m - 1] + ' ' + y;
        }
      }
      // Grade pills
      const gradeOrder = ['S+','S','A','B','C','D'];
      const gradeColors = { 'S+':'var(--s-plus)','S':'var(--s)','A':'var(--a)','B':'var(--b)','C':'var(--c)','D':'var(--d)' };
      const gCnts = {}; gradeOrder.forEach(g => gCnts[g]=0);
      records.forEach(r => { const g = r.grading.trim(); if (gCnts[g] !== undefined) gCnts[g]++; });
      const pills = gradeOrder.filter(g => gCnts[g] > 0).map(g =>
        '<span class="month-grade-pill" style="background:'+gradeColors[g]+'">'+g+':'+gCnts[g]+'</span>'
      ).join('');

      sec.innerHTML =
        '<div class="month-header">' +
          '<span class="month-name">'+escapeHtml(title)+'</span>' +
          (k !== '0000-00' ? '<span class="month-count">'+records.length+' '+t('shows')+'</span>' : '') +
          pills +
        '</div>' +
        '<div class="table-wrap">' + buildTableHtml(records) + '</div>';
      wrap.appendChild(sec);
    });
  }

  function buildTableHtml(records) {
    const cols = [
      { key: '_no', label: t('col-no'), cls: 'num' },
      { key: 'source', label: t('col-source'), render: r => '<span class="tag tag-source tag-source-'+r.source+'">'+I18N[LANG].sources[r.source]+'</span>' },
      { key: 'grading', label: t('col-grade'), render: r => r.grading ? '<span class="tag tag-grade-'+r.grading.replace('+','-plus')+'">'+r.grading+'</span>' : emptyCell() },
      { key: 'name', label: t('col-name'), cls: 'wrap', render: r => escapeHtml(fld(r,'name')) || emptyCell() },
      { key: 'category', label: t('col-category'), render: r => {
          const cat = (r.source === 'sports' && fld(r,'eventType')) ? fld(r,'eventType') : fld(r,'category');
          return cat ? '<span class="tag-cat">'+escapeHtml(cat)+'</span>' : emptyCell();
      }},
      { key: 'artist', label: t('col-artist'), cls: 'wrap', render: r => escapeHtml(fld(r,'artist')) || emptyCell() },
      { key: 'city', label: t('col-city'), render: r => escapeHtml(fld(r,'city')) || emptyCell() },
      { key: 'country', label: t('col-country'), render: r => escapeHtml(fld(r,'country')) || emptyCell() },
      { key: 'poiId', label: t('col-poi'), cls: 'num', render: r => escapeHtml(r.poiId) || emptyCell() },
      { key: 'startTime', label: t('col-start'), cls: 'date', render: r => fmtDate(r.startTime) },
      { key: 'endTime', label: t('col-end'), cls: 'date', render: r => fmtDate(r.endTime) },
      { key: 'infoTime', label: t('col-info'), cls: 'date', render: r => fmtDate(r.infoTime) },
      { key: 'announceTime', label: t('col-announce'), cls: 'date', render: r => fmtDate(r.announceTime) },
      { key: 'addedAnnounceTime', label: t('col-added'), cls: 'date', render: r => fmtDate(r.addedAnnounceTime) },
      { key: 'saleTime', label: t('col-sale'), cls: 'date', render: r => fmtDate(r.saleTime) },
      { key: 'sale2Time', label: t('col-sale2'), cls: 'date', render: r => fmtDate(r.sale2Time) },
      { key: 'sale3Time', label: t('col-sale3'), cls: 'date', render: r => fmtDate(r.sale3Time) },
      { key: 'status', label: t('col-status'), render: r => escapeHtml(fld(r,'status')) || emptyCell() },
      { key: 'keySites', label: t('col-keysites'), render: r => escapeHtml(fld(r,'keySites')) || emptyCell() },
      { key: 'pushSites', label: t('col-pushsites'), render: r => escapeHtml(r.pushSites) || emptyCell() },
      { key: 'remarks', label: t('col-remarks'), cls: 'wrap', render: r => escapeHtml(fld(r,'remarks')) || emptyCell() },
    ];
    // Dynamically append extra columns from Feishu fields not in core schema
    for (const [fid, finfo] of Object.entries(EXTRA_FIELDS)) {
      cols.push({ key: '__extra_' + fid, label: escapeHtml(finfo.name), cls: 'wrap',
        render: r => escapeHtml((r.__extra || {})[fid] || '') || emptyCell() });
    }
    cols.push(
      { key: 'createdTime', label: t('col-created'), cls: 'date', render: r => fmtTs(r.createdTime) },
      { key: 'modifiedTime', label: t('col-modified'), cls: 'date', render: r => fmtTs(r.modifiedTime) }
    );
    const head = '<thead><tr>' + cols.map((c, i) => {
      const sc = i < 5 ? ' class="sticky-'+(i+1)+'"' : '';
      return '<th'+sc+'>'+c.label+'</th>';
    }).join('') + '</tr></thead>';
    const SEVEN_DAYS_MS = 7 * 24 * 3600 * 1000;
    const body = '<tbody>' + records.map((r, i) => {
      r._no = i + 1;
      const isNew = r.createdTime && (Date.now() - r.createdTime < SEVEN_DAYS_MS);
      return '<tr' + (isNew ? ' class="tr-new"' : '') + '>' + cols.map((c, ci) => {
        const sc = ci < 5 ? ' sticky-'+(ci+1) : '';
        const cls = (c.cls ? c.cls : '') + sc;
        const clsAttr = cls.trim() ? ' class="'+cls.trim()+'"' : '';
        const val = c.render ? c.render(r) : (c.key === '_no' ? r._no : escapeHtml(r[c.key] || '') || emptyCell());
        return '<td'+clsAttr+'>'+val+'</td>';
      }).join('') + '</tr>';
    }).join('') + '</tbody>';
    return '<table>' + head + body + '</table>';
  }

  function fmtDate(s) {
    if (!s) return emptyCell();
    return '<span class="date">'+escapeHtml(s)+'</span>';
  }
  function fmtTs(ms) {
    if (!ms) return emptyCell();
    const d = new Date(ms);
    const s = d.getFullYear() + '/' +
      String(d.getMonth()+1).padStart(2,'0') + '/' +
      String(d.getDate()).padStart(2,'0');
    return '<span class="date">'+s+'</span>';
  }
  function emptyCell() { return '<span class="empty">—</span>'; }
  function escapeHtml(s) {
    return ('' + (s == null ? '' : s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Sticky filter summary ----------
  function updateFilterSummary() {
    const chips = $('filter-active-chips');
    if (!chips) return;
    chips.innerHTML = '';
    const defs = [
      { label: t('lbl-source'),   val: state.source,   display: state.source ? I18N[LANG].sources[state.source] : '' },
      { label: t('lbl-grading'),  val: state.grading,  display: state.grading },
      { label: t('lbl-category'), val: state.category, display: LANG === 'en' ? translate(state.category, 'category') : state.category },
      { label: t('lbl-country'),  val: state.country,  display: LANG === 'en' ? translate(state.country, 'country') : state.country },
      { label: t('lbl-year'),     val: state.year,     display: state.year },
      { label: t('lbl-month'),    val: state.month,    display: (() => {
          if (!state.month) return '';
          const [y, m] = state.month.split('-');
          return LANG === 'zh' ? y + '/' + I18N[LANG].monthNames[+m - 1] : I18N[LANG].monthNames[+m - 1] + ' ' + y;
        })()
      },
      { label: t('lbl-created'),  val: state.createdWithin, display: state.createdWithin ? t('created-' + state.createdWithin) : '' }
    ];
    let hasActive = false;
    for (const d of defs) {
      if (!d.val) continue;
      hasActive = true;
      const c = document.createElement('span');
      c.className = 'filter-active-chip';
      c.textContent = d.label + ': ' + d.display;
      chips.appendChild(c);
    }
    if (!hasActive) {
      const c = document.createElement('span');
      c.className = 'filter-active-chip chip-all';
      c.textContent = t('all');
      chips.appendChild(c);
    }
  }

  function setupStickyFilter() {
    const filterBar = document.querySelector('.filter-bar');
    const toggleBtn = $('filter-toggle-btn');
    const main = document.querySelector('.main');
    if (!filterBar || !main) return;

    let isFixed = false;
    let placeholder = null;
    let threshold = 0;

    function computeThreshold() {
      threshold = filterBar.offsetTop + filterBar.offsetHeight;
    }

    function goFixed() {
      if (isFixed) return;
      isFixed = true;
      placeholder = document.createElement('div');
      placeholder.style.height = filterBar.offsetHeight + 'px';
      placeholder.style.flexShrink = '0';
      filterBar.parentNode.insertBefore(placeholder, filterBar);
      filterBar.style.position = 'fixed';
      filterBar.style.top = '56px';
      filterBar.style.left = '0';
      filterBar.style.right = '0';
      filterBar.style.zIndex = '25';
      filterBar.classList.add('bar-fixed');
      if (toggleBtn) toggleBtn.textContent = t('filter-expand');
    }

    function goUnfixed() {
      if (!isFixed) return;
      isFixed = false;
      if (placeholder) { placeholder.remove(); placeholder = null; }
      filterBar.style.position = '';
      filterBar.style.top = '';
      filterBar.style.left = '';
      filterBar.style.right = '';
      filterBar.style.zIndex = '';
      filterBar.classList.remove('bar-fixed', 'bar-expanded');
      if (toggleBtn) toggleBtn.textContent = t('filter-expand');
    }

    computeThreshold();

    main.addEventListener('scroll', () => {
      if (main.scrollTop > threshold) {
        goFixed();
      } else {
        goUnfixed();
      }
    }, { passive: true });

    if (toggleBtn) {
      toggleBtn.onclick = () => {
        filterBar.classList.toggle('bar-expanded');
        const expanded = filterBar.classList.contains('bar-expanded');
        toggleBtn.textContent = expanded ? t('filter-collapse') : t('filter-expand');
      };
    }
  }

  // ---------- I18n apply ----------
  function applyI18n() {
    document.documentElement.lang = LANG === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      // Preserve children for the "updated" + span case
      if (k === 'updated') {
        el.firstChild.nodeValue = t('updated') + ': ';
      } else {
        el.textContent = t(k);
      }
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
    });
    // update toggle button label based on current expanded state
    const toggleBtn = $('filter-toggle-btn');
    if (toggleBtn) {
      const isExpanded = document.querySelector('.filter-bar').classList.contains('bar-expanded');
      toggleBtn.textContent = isExpanded ? t('filter-collapse') : t('filter-expand');
    }
  }

  // ---------- Wire up ----------
  $('f-search').oninput = e => { state.search = e.target.value; rerender(); };
  $('f-active').onchange = e => { state.activeOnly = e.target.checked; rerender(); };
  $('f-reset').onclick = () => {
    state.search = ''; state.source = ''; state.grading = ''; state.category = '';
    state.country = ''; state.year = ''; state.month = ''; state.createdWithin = ''; state.activeOnly = false;
    $('f-search').value = ''; $('f-active').checked = false;
    rerender();
  };
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.onclick = () => {
      LANG = btn.dataset.lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b === btn));
      applyI18n();
      rerender();
    };
  });

  function rerender() {
    const filtered = applyFilters(RECORDS);
    renderOverview(filtered);
    renderMonthSections(filtered);
    buildFilters(); // refresh chip counts/labels (in case lang changed)
    updateFilterSummary();
  }

  applyI18n();
  buildFilters();
  rerender();
  setupStickyFilter();

  // fill watermark timestamp
  function nowText() {
    const d = new Date();
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0')
      + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  document.body.dataset.watermark = (document.body.dataset.watermark || '').replace('{{NOW}}', nowText());
})();
</script>
</body>
